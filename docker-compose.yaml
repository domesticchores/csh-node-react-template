services:
  themeswitcher:
    build: .
    container_name: template
    environment:
      SSO_REDIRECT_URL: "${SSO_REDIRECT_URL}"
      CLIENT_ID: "${CLIENT_ID}"
      CLIENT_SECRET: "${CLIENT_SECRET}"
      PORT: "${PORT}"
      HOST: "${HOST}"
      EXPRESS_SESSION_SECRET: "${EXPRESS_SESSION_SECRET}"
    ports:
      - "${PORT}:${PORT}"
